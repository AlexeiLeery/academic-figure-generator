services:
  backend:
    ports: []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes: []
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  celery-worker:
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  nginx:
    # In production, it's common to have another reverse-proxy already bound to 80/443.
    # Bind nginx only on localhost and let your main reverse-proxy forward traffic to it.
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-8082}:80"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
